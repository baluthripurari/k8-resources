apiVersion: v1
kind: Pod
metadata:
  name: annotations-demo
  labels:
    environment: production
    app: nginx
  annotations:
    imageregistry: "https://hub.docker.com/"
    description: "nginx pod for testing"
    team: "aws devops team"
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80