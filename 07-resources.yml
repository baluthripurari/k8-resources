---
apiVersion: v1
kind: Pod
metadata:
  name: resources-limits-requests
spec:
  containers:
  - name: app
    image: almalinux:latest
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
  - name: log-aggregator
    image: tomcat:latest
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"